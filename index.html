<!doctype html>
<html lang="km">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#c9aa68">
    <title>សិរីមង្គលពិធីភ្ជាប់ពាក្យ ធឿន ស៊ីថា ❤️ ថាំង ពិសី</title>
    <meta name="description" content="សិរីមង្គលភ្ជាប់ពាក្យ ធឿន ស៊ីថា និង ថាំង ពិសី — ថ្ងៃអាទិត្យ ទី១៧ ខែឧសភា ឆ្នាំ២០២៦។">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700;800&family=Moul&family=Great+Vibes&family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="cover-page">
    <main class="cover-shell">
      <section class="cover-hero poster-cover" aria-label="Wedding invitation cover">
        <article class="khmer-poster">
          <div class="poster-main-copy">
            <p class="poster-kicker effect-slide-up">សូមអញ្ជើញចូលរួម</p>
            <h1 class="effect-zoom-in">សិរីមង្គលភ្ជាប់ពាក្យ</h1>
            <div class="poster-divider" aria-hidden="true">
              <span></span>
              <strong>✤</strong>
              <span></span>
            </div>
            <p class="poster-names effect-flip-in">ធឿន ស៊ីថា</p>
            <p class="poster-with effect-rotate-fade">និង</p>
            <p class="poster-names effect-flip-in">ថាំង ពិសី</p>
          </div>

          <button class="poster-button" id="openInvitation" type="button" data-target="invitation.html">
            <span class="effect-slide-up">បើកធៀប</span>
          </button>

          <div class="poster-footer-copy">
            <p>សូមអញ្ជើញចូលរួមជាភ្ញៀវកិត្តិយស</p>
            <strong>១៧ ឧសភា ២០២៦</strong>
          </div>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
